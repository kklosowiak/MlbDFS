
        <!DOCTYPE html>
        <html lang="en">
        <head>
            <meta charset="UTF-8">
            <title>OMEGA v4.2 Production Report</title>
            <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;700&family=Roboto+Mono&display=swap');
        
        body { 
            background: #050505; 
            color: #e0e0e0; 
            font-family: 'Outfit', sans-serif; 
            padding: 40px; 
            max-width: 1200px; 
            margin: auto;
        }
        
        h1 { 
            text-align: center; 
            color: #00FFFF; 
            text-transform: uppercase; 
            letter-spacing: 4px;
            margin-bottom: 40px;
            font-weight: 700;
        }
        
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
        }
        
        .card { 
            background: linear-gradient(145deg, #111, #080808);
            border-radius: 12px; 
            padding: 24px; 
            border: 1px solid #222; 
            position: relative;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }
        
        /* THE GLOW EFFECT */
        .glow {
            border: 2px solid #00FFFF !important;
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.4), inset 0 0 10px rgba(0, 255, 255, 0.1);
        }
        
        .highlight { border-color: #FFD700; box-shadow: 0 0 10px rgba(255, 215, 0, 0.1); }
        .dim { opacity: 0.4; filter: grayscale(1); }
        
        .score-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }
        
        .score { 
            font-family: 'Roboto Mono', monospace;
            font-size: 32px; 
            font-weight: 700; 
            color: #00FFFF; 
        }
        
        .player-info {
            border-bottom: 1px solid #333;
            padding-bottom: 10px;
            margin-bottom: 15px;
        }
        
        .name { font-size: 20px; font-weight: 700; color: #fff; }
        .team-pos { font-size: 14px; color: #888; text-transform: uppercase; }
        
        .signals {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        
        .signal-pill {
            font-size: 10px;
            font-weight: 700;
            padding: 4px 8px;
            border-radius: 4px;
            text-transform: uppercase;
            background: #222;
        }
        
        .signal-flame { color: #FF4500; border: 1px solid #FF4500; }
        .signal-target { color: #00FFFF; border: 1px solid #00FFFF; }
        .signal-jackpot { color: #FFD700; border: 1px solid #FFD700; }
        .signal-train { color: #ADFF2F; border: 1px solid #ADFF2F; }
        
        .metrics {
            margin-top: 15px;
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            color: #666;
        }
        </style>
        </head>
        <body>
            <h1>OMEGA v4.2 Hybrid-Relative Model</h1>
            <div class="grid">
        
            </div>
        </body>
        </html>

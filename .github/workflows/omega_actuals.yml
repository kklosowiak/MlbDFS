name: OMEGA Actuals + Processing
on:
  schedule:
    - cron: '0 6 * * *'    # 2:00am ET (06:00 UTC)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  process:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: audit/july-2026
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Fetch actuals
        run: python scripts/passive/nightly_actuals.py
      - name: Run signal tracker
        run: python scripts/passive/signal_tracker.py
      - name: Generate digest
        run: python scripts/passive/generate_digest.py
      - name: Update dashboard
        run: python scripts/passive/update_dashboard.py
      - name: Commit all outputs
        if: always()
        run: |
          git config user.email "omega-bot@noreply.github.com"
          git config user.name "OMEGA Bot"
          # Explicitly add the tracking outputs and dashboard per Correction 1
          git add scratch/passive_tracker/signals/
          git add scratch/passive_tracker/snapshots/rollup_week_*.csv
          git add scratch/passive_tracker/digests/
          git add docs/audit_dashboard.html
          git add scratch/passive_tracker/actuals_log.txt
          git add scratch/passive_tracker/error_log.txt
          git diff --staged --quiet || git commit -m "auto: nightly processing $(date -u +%Y-%m-%d)"
          git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/kklosowiak/MlbDFS.git audit/july-2026
